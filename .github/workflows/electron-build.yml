name: Build Electron App

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: git tag v0.1.0 && git push --tags
  workflow_dispatch:   # or trigger manually from GitHub Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: electron:build:win
            artifact: dist/*.exe
          - os: macos-latest
            script: electron:build:mac
            artifact: dist/*.dmg
          - os: ubuntu-latest
            script: electron:build:linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # electron-builder uses this to skip code signing in CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Mac notarization — set these in GitHub repo secrets if you need signed builds
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoCode-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download files
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LoCode-*/*
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
