name: Build Electron App
run-name: Building release ${{ github.ref_name }} ✘

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: git tag v0.1.0 && git push --tags
  workflow_dispatch:   # or trigger manually from GitHub Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist/*.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    # Point electron + electron-builder at workspace-relative dirs so the
    # cache path is identical on all platforms (no OS-specific %APPDATA% etc.)
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - uses: actions/checkout@v4

      # npm tarball cache (~/.npm) — speeds up downloads inside npm ci
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache node_modules — on hit, skips npm ci entirely (saves ~1:30)
      - uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      # On cache hit, npm ci (and its postinstall: nuxt prepare) was skipped
      - name: Prepare Nuxt types
        if: steps.cache-deps.outputs.cache-hit == 'true'
        run: npx nuxt prepare

      # Nuxt build cache (platform-independent — shared across all 3 OS runners)
      # Key has no runner.os: .output is pure JS, identical on every platform.
      # Whichever runner builds first, the other two restore from cache and skip.
      - uses: actions/cache@v4
        id: cache-nuxt
        with:
          path: .output
          key: nuxt-${{ hashFiles('app/**', 'server/**', 'nuxt.config.ts', 'package-lock.json') }}

      - name: Build Nuxt
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxt build

      # Electron binary + electron-builder tools cache
      - uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Package with electron-builder
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Mac notarization — set these in GitHub repo secrets if you need signed builds
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoCode-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download files
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LoCode-*/*
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
