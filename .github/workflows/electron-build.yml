name: Build Electron App
run-name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Cache warm ({0})', github.ref_name) }}

on:
  push:
    tags:
      - 'v*'           # full build + release
    branches:
      - main           # cache warming only — no packaging
  workflow_dispatch:

jobs:
  check_branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch main
        run: git fetch origin main --tags
      - name: Exit if tag linked to wrong branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            exit 1
          fi

  build:
    needs: check_branch
    strategy:
      matrix:
        include:
          # - os: windows-latest
          #   platform: win
          #   artifact: dist/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist/*.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    env:
      # Workspace-relative paths work identically on all platforms
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - uses: actions/checkout@v6

      # Caches ~/.npm tarballs (per-OS, ~300 MB) so npm ci downloads are instant.
      # NOT caching node_modules (1.6 GB — upload times out and never saves).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python setuptools (node-gyp needs distutils, removed in Python 3.12)
        run: pip3 install setuptools --break-system-packages

      - name: Install dependencies
        run: npm ci

      # .output is only 17 MB and platform-independent.
      # Saved to main on every push → tag builds find it via the main fallback.
      - uses: actions/cache@v4
        id: cache-nuxt
        with:
          path: .output
          key: nuxt-${{ hashFiles('app/**', 'server/**', 'nuxt.config.ts', 'package-lock.json') }}

      - name: Build Nuxt
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxt build

      # ---- Steps below only run on tag pushes (actual releases) ----

      # Electron binary + prebuilt native module binaries (~200 MB per platform)
      - uses: actions/cache@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Package with electron-builder
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: LoCode-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  create_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download files
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LoCode-*/*
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
